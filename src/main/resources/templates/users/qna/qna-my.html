<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 QnA - RunGame</title>

    <style>
        /*상단 네비 아이콘 버튼*/
        .nav-icon-btn {
          position: fixed;
          top: 16px;
          width: 42px;
          height: 42px;
          border-radius: 12px;
          background: rgba(255,255,255,0.1);
          border: 1px solid rgba(255,255,255,0.25);
          display: flex;
          justify-content: center;
          align-items: center;
          color: white;
          font-size: 20px;
          cursor: pointer;
          z-index: 9999;
          backdrop-filter: blur(6px);
        }
        .nav-back {
            left: 16px;
        }
        .nav-home {
            right: 16px;
        }

        /*페이지 전체 스타일*/
        body {
          margin:0;
          background:#0f172a;
          color:#fff;
          font-family:'Inter', sans-serif;
        }

        .container {
          max-width:800px;
          margin:40px auto;
          padding:0 20px;
        }

        h1 {
          text-align:center;
          color:#60a5fa;
          margin-bottom:30px;
        }

        /*검색, 상단 컨트롤 영역*/
        .search-box {
          display:flex;
          gap:8px;
          margin-bottom:16px;
          flex-wrap:wrap;
          align-items:center;
        }

        .search-input {
          flex:1;
          min-width:220px;
          padding:10px 14px;
          border-radius:8px;
          border:1px solid #334155;
          background:#1e293b;
          color:white;
        }

        .search-btn,
        .switch-btn {
          padding:10px 16px;
          border-radius:8px;
          border:1px solid #334155;
          background:#1e293b;
          color:#e5e7eb;
          cursor:pointer;
          font-weight:600;
        }

        .search-btn {
          background:#3b82f6;
          border:none;
          color:white;
        }

        .switch-btn:hover {
          background:#334155;
        }

        /*일괄 선택, 삭제용 상단 바*/
        .bulk-bar {
          display:none;
          justify-content:space-between;
          align-items:center;
          margin-bottom:16px;
          padding:10px 14px;
          border-radius:10px;
          background:#1e293b;
          border:1px solid #334155;
        }

        .bulk-bar label {
          display:flex;
          align-items:center;
          gap:8px;
          color:#e5e7eb;
          font-weight:600;
        }

        .danger-btn {
          background:rgba(239,68,68,0.15);
          border:1px solid #ef4444;
          color:#fca5a5;
          padding:8px 14px;
          border-radius:8px;
          font-weight:600;
          cursor:pointer;
        }

        .cancel-btn {
          background:#334155;
          border:none;
          color:#e5e7eb;
          padding:8px 14px;
          border-radius:8px;
          cursor:pointer;
        }

        /*QnA 카드 리스트*/
        .qna-card {
          background:#1e293b;
          border:1px solid #334155;
          border-radius:14px;
          padding:16px 18px;
          margin-bottom:14px;
          cursor:pointer;
          display:flex;
          gap:14px;
          align-items:flex-start;
        }

        .qna-card:hover {
          background:#243349;
        }

        .select-checkbox {
          margin-top:6px;
          transform:scale(1.2);
          cursor:pointer;
        }

        .qna-content {
          flex:1;
        }

        .qna-title {
          font-size:18px;
          font-weight:700;
          margin-bottom:6px;
        }

        .qna-meta-top {
          font-size:13px;
          color:#94a3b8;
          margin-bottom:8px;
        }

        .badges {
          display:flex;
          gap:8px;
        }

        .badge {
          padding:4px 10px;
          border-radius:999px;
          font-size:12px;
          font-weight:600;
        }

        .public   {
            background:#1e40af;
        }
        .private  {
            background:#7c2d12;
        }
        .answered {
            background:#065f46;
        }
        .waiting  {
            background:#374151;
        }

        /*하단 페이지네이션 버튼*/
        .pagination {
          display:flex;
          justify-content:center;
          gap:12px;
          margin:30px 0;
        }

        .page-btn {
          padding:8px 14px;
          background:#1e293b;
          border:1px solid #334155;
          border-radius:8px;
          color:#fff;
          cursor:pointer;
        }

        .page-btn:hover {
          background:#2563eb;
          border-color:#2563eb;
        }

        .page-btn.disabled {
          background:#334155;
          cursor:not-allowed;
        }
    </style>
    <link rel="stylesheet" href="/css/popup.css">
    <script src="/js/popup.js"></script>
</head>

<body>

<button class="nav-icon-btn nav-back" onclick="history.back()">←</button>
<button class="nav-icon-btn nav-home" onclick="location.href='/'">🏠</button>

<div class="container">
    <h1>내 질문 목록</h1>

    <div class="search-box">
        <input id="keyword" class="search-input" placeholder="검색어 입력">
        <button class="search-btn" onclick="loadMyQna(0)">검색</button>
        <button class="switch-btn" onclick="enterSelectMode()">선택</button>
        <button class="switch-btn" onclick="location.href='/qna'">전체 QnA</button>
    </div>

    <div id="bulkActionBar" class="bulk-bar">
        <label>
            <input id="selectAllCheckbox" type="checkbox" onclick="toggleSelectAll(this)">
            전체 선택
        </label>

        <div>
            <button class="danger-btn" onclick="deleteSelected()">선택 삭제</button>
            <button class="cancel-btn" onclick="exitSelectMode()">취소</button>
        </div>
    </div>

    <div id="qnaList"></div>
    <div class="pagination" id="pagination"></div>
</div>

<script type="module">
    import { apiFetch } from "/js/api.js";

    let currentPage = 0;
    const size = 10;    //한 페이지당 노출 개수
    let selectMode = false; //선택 모드 on,off 플래그
    let selectedIds = new Set();    //선택된 질문 id 집합

    //내 QnA 목록 조회
    async function loadMyQna(page = 0) {
      currentPage = page;
      const keyword = document.getElementById("keyword").value.trim();

      const params = new URLSearchParams();
      if (keyword) params.append("keyword", keyword);
      params.append("page", page);
      params.append("size", size);

      const res = await apiFetch(`/api/qna/my/questions?${params.toString()}`);
      const json = await res.json();

      const listEl = document.getElementById("qnaList");
      const pageEl = document.getElementById("pagination");
      listEl.innerHTML = "";
      pageEl.innerHTML = "";

      if (!json.success) {
        alert(json.error || "조회 실패");
        return;
      }

      const pageData = json.data;
      const list = pageData.content;

      //조회 결과가 없을 경우 메세지 출력
      if (!list.length) {
        listEl.innerHTML = `<div style="text-align:center;color:#94a3b8;margin-top:30px;">질문이 없습니다.</div>`;
        return;
      }

      //목록 카드 렌더링
      list.forEach(q => {
        const card = document.createElement("div");
        card.className = "qna-card";

        //카드 클릭 시 상세 페이지 이동
        card.onclick = () => {
          location.href = `/qna/detail?id=${q.id}`;
        };

        //선택 모드일 때만 체크박스 노출
        card.innerHTML = `
          ${selectMode ? `
            <input type="checkbox"
                   class="select-checkbox"
                   data-id="${q.id}"
                   ${selectedIds.has(q.id) ? "checked" : ""}
                   onclick="event.stopPropagation(); toggleSelect(${q.id})">
          ` : ""}

          <div class="qna-content">
            <div class="qna-title">${q.title}</div>
            <div class="qna-meta-top">${q.createdAt.substring(0,10)}</div>
            <div class="badges">
              <span class="badge ${q.visibility === "PRIVATE" ? "private" : "public"}">
                ${q.visibility === "PRIVATE" ? "비공개" : "공개"}
              </span>
              <span class="badge ${q.answered ? "answered" : "waiting"}">
                ${q.answered ? "답변완료" : "미답변"}
              </span>
            </div>
          </div>
        `;

        listEl.appendChild(card);
      });

      //페이지네이션
      const prev = document.createElement("button");
      prev.className = "page-btn" + (pageData.first ? " disabled" : "");
      prev.textContent = "◀ 이전";
      prev.onclick = () => !pageData.first && loadMyQna(page - 1);

      const next = document.createElement("button");
      next.className = "page-btn" + (pageData.last ? " disabled" : "");
      next.textContent = "다음 ▶";
      next.onclick = () => !pageData.last && loadMyQna(page + 1);

      pageEl.append(prev, next);
    }

    //선택 모드 진입
    function enterSelectMode() {
      selectMode = true;
      selectedIds.clear();
      document.getElementById("bulkActionBar").style.display = "flex";
      loadMyQna(currentPage);
    }

    //선택 모드 종료
    function exitSelectMode() {
      selectMode = false;
      selectedIds.clear();
      document.getElementById("bulkActionBar").style.display = "none";
      document.getElementById("selectAllCheckbox").checked = false;
      loadMyQna(currentPage);
    }

    //개별 체크박스 토글
    function toggleSelect(id) {
      if (selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
    }

    //전체 선택 토글
    function toggleSelectAll(checkbox) {
      selectedIds.clear();
      document.querySelectorAll(".select-checkbox").forEach(cb => {
        cb.checked = checkbox.checked;
        if (checkbox.checked) {
          selectedIds.add(Number(cb.dataset.id));
        }
      });
    }

    //선택된 질문들 일괄 삭제
    async function deleteSelected() {
      if (!selectedIds.size) {
        alert("삭제할 질문을 선택하세요.");
        return;
      }

      if (!confirm(`선택한 ${selectedIds.size}개의 질문을 삭제하시겠습니까?`)) return;

      const res = await apiFetch("/api/qna/my/questions", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids: Array.from(selectedIds) })
      });

      if (res.ok) {
        alert("삭제되었습니다.");
        exitSelectMode();
        loadMyQna(0);
      } else {
        const err = await res.json();
        alert(err.message || "삭제 실패");
      }
    }

    //최초 진입 시 0페이지 로딩
    loadMyQna();
</script>

</body>
</html>
