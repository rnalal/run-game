<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>QnA - RunGame</title>

    <style>
        /*상단 네비 아이콘 버튼*/
        .nav-icon-btn {
          position: fixed;
          top: 16px;
          width: 42px;
          height: 42px;
          border-radius: 12px;
          background: rgba(255,255,255,0.1);
          border: 1px solid rgba(255,255,255,0.25);
          display: flex;
          justify-content: center;
          align-items: center;
          color: white;
          font-size: 20px;
          cursor: pointer;
          z-index: 9999;
          backdrop-filter: blur(6px);
        }
        .nav-back {
            left: 16px;
        }
        .nav-home {
            right: 16px;
        }

        /*페이지 기본 스타일*/
        body {
          margin:0;
          background:#0f172a;
          color:#fff;
          font-family:'Inter', sans-serif;
        }

        .container {
          max-width:800px;
          margin:40px auto;
          padding:0 20px;
        }

        h1 {
          text-align:center;
          color:#60a5fa;
          margin-bottom:30px;
        }

        /*검색 영역*/
        .search-box {
          display:flex;
          gap:8px;
          margin-bottom:24px;
        }

        .search-input {
          width:60%;
          padding:10px 14px;
          border-radius:8px;
          border:1px solid #334155;
          background:#1e293b;
          color:white;
          flex:1;
        }

        .search-btn, .my-btn {
          padding:10px 14px;
          border-radius:8px;
          border:none;
          cursor:pointer;
          font-weight:600;
        }

        .search-btn {
            background:#3b82f6;
            color:white;
        }

        .my-btn {
          background:transparent;
          border:1px solid #60a5fa;
          color:#60a5fa;
        }

        /*QnA 카드 리스트*/
        .qna-card {
          background:#1e293b;
          border:1px solid #334155;
          border-radius:14px;
          padding:18px 20px;
          margin-bottom:16px;
          cursor:pointer;
        }

        .qna-card:hover {
            background:#243349;
        }

        .qna-title {
          font-size:18px;
          font-weight:700;
          margin-bottom:8px;
        }

        .qna-meta-top {
          font-size:13px;
          color:#94a3b8;
          margin-bottom:10px;
        }

        .badges {
          display:flex;
          gap:8px;
        }

        .badge {
          padding:4px 10px;
          border-radius:999px;
          font-size:12px;
          font-weight:600;
        }

        /*공개/비공개 답변 상태 배지 색상*/
        .public {
            background:#1e40af;
        }
        .private {
            background:#7c2d12;
        }
        .answered {
            background:#065f46;
        }
        .waiting {
            background:#374151;
        }

        /*비공개 잠금 카드 스타일*/
        .qna-card.private-lock {
          opacity:0.5;
          cursor:not-allowed;
          position:relative;
        }

        .qna-card.private-lock::after {
          content:"🔒 비공개 질문";
          position:absolute;
          inset:0;
          display:flex;
          justify-content:center;
          align-items:center;
          background:rgba(15,23,42,0.75);
          border-radius:14px;
          font-weight:700;
        }

        /*글쓰기 floating 버튼*/
        .fab-write {
          position: fixed;
          right: 24px;
          bottom: 24px;
          width: 64px;
          height: 64px;
          border-radius: 50%;
          background:#3b82f6;
          color:white;
          font-size:30px;
          border:none;
          cursor:pointer;
          box-shadow:0 8px 20px rgba(59,130,246,0.45);
        }

        /*페이지네이션 영역*/
        .pagination {
          display:flex;
          justify-content:center;
          gap:12px;
          margin:30px 0;
        }

        .page-btn {
          padding:8px 14px;
          background:#1e293b;
          border:1px solid #334155;
          border-radius:8px;
          color:#fff;
          cursor:pointer;
          font-size:14px;
        }

        .page-btn:hover {
          background:#2563eb;
          border-color:#2563eb;
        }

        .page-btn.disabled {
          background:#334155;
          cursor:not-allowed;
        }

    </style>
    <link rel="stylesheet" href="/css/popup.css">
    <script src="/js/popup.js"></script>
</head>

<body>

<button class="nav-icon-btn nav-back" onclick="history.back()">←</button>
<button class="nav-icon-btn nav-home" onclick="location.href='/'">🏠</button>

<div class="container">
    <h1>Q&A</h1>

    <div class="search-box">
        <input id="keyword" class="search-input" placeholder="검색어 입력">
        <button class="search-btn" onclick="loadQna()">검색</button>
        <button class="my-btn" onclick="location.href='/qna/my'">내 글</button>
    </div>

    <div id="qnaList"></div>

    <div class="pagination" id="pagination"></div>

    <button class="fab-write" onclick="location.href='/qna/write'">＋</button>
</div>

<script type="module">
    import { apiFetch } from "/js/api.js";

    //현재 로그인한 유저 ID
    const currentUserId = window.CURRENT_USER_ID ?? null;
    //현재 페이지 번호
    let currentPage = 0;

    //QnA 목록 조회
    async function loadQna(page = 0) {
      currentPage = page;
      //검색 키워드 읽기
      const keyword = document.getElementById("keyword").value.trim();
      //질문 목록 API 호출
      const res = await apiFetch(`/api/qna/questions?keyword=${encodeURIComponent(keyword)}&page=${page}`);
      const json = await res.json();

      const listEl = document.getElementById("qnaList");
      const pageEl = document.getElementById("pagination");
      listEl.innerHTML = "";
      pageEl.innerHTML = "";

      //공통 응답 포맷 체크
      if (!json.success) return alert(json.error);

      //질문 리스트 렌더링
      json.data.content.forEach(q => {
        const isPrivate = q.visibility === "PRIVATE";
        const isMine = q.userId === currentUserId;

        const card = document.createElement("div");
        card.className = "qna-card";

        //비공개+내 글이 아니면 클릭 불가
        if (isPrivate && !isMine) {
          card.classList.add("private-lock");
        } else {
          //그 외에는 상세 페이지로 이동
          card.onclick = () => location.href = `/qna/detail?id=${q.id}`;
        }

        //카드 내용 템플릿
        card.innerHTML = `
          <div class="qna-title">${q.title}</div>
          <div class="qna-meta-top"> ${q.writerName} · ${q.createdAt.substring(0,10)}</div>
          <div class="badges">
            <span class="badge ${isPrivate ? "private" : "public"}">${isPrivate ? "비공개" : "공개"}</span>
            <span class="badge ${q.answered ? "answered" : "waiting"}">${q.answered ? "답변완료" : "미답변"}</span>
          </div>
        `;
        listEl.appendChild(card);
      });

      //페이지네이션 버튼 구성
      const prev = document.createElement("button");
        prev.className = "page-btn" + (json.data.first ? " disabled" : "");
        prev.textContent = "◀ 이전";
        prev.onclick = () => {
          if (!json.data.first) loadQna(page - 1);
        };

        const next = document.createElement("button");
        next.className = "page-btn" + (json.data.last ? " disabled" : "");
        next.textContent = "다음 ▶";
        next.onclick = () => {
          if (!json.data.last) loadQna(page + 1);
        };

        pageEl.appendChild(prev);
        pageEl.appendChild(next);

    }

    //첫 진입 시 기본 목록 로딩
    loadQna();
</script>

</body>
</html>
