<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>RunGame 로그인</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Pretendard&display=swap" rel="stylesheet">

  <style>
    /*공통 네비 버튼 스타일*/
    .nav-icon-btn {
      position: fixed;
      top: 16px;

      width: 42px;
      height: 42px;
      border-radius: 12px;

      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);

      display: flex;
      justify-content: center;
      align-items: center;

      color: white;
      font-size: 20px;
      cursor: pointer;
      z-index: 9999;

      backdrop-filter: blur(6px);
      transition: 0.2s;
    }

    .nav-icon-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    /*왼쪽 상단 위치*/
    .nav-back {
      left: 16px;
    }

    /*오른쪽 상단 위치*/
    .nav-home {
      right: 16px;
    }

    .with-nav-padding {
      margin-top: 80px;
    }

    /*색상,공통 값 정의*/
    :root {
      --primary: #3b82f6;
      --primary-glow: #60a5fa;
      --bg-dark: #0f172a;
      --bg-card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.15);
      --text-light: #e2e8f0;
    }

    /*전체 기본 박스 모델,폰트 설정*/
    * {
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    /*전체 배경 및 가운데 정렬*/
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-light);
    }

    /*로그인 카드 컨테이너*/
    .login-container {
      width: 380px;
      background: var(--bg-card);
      padding: 32px;
      border-radius: 16px;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
      animation: fadeIn 0.9s ease;
    }

    /*로그인 카드 등장 애니메이션*/
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /*상단 RUN GAME LOGIN 타이틀 스타일*/
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      text-align: center;
      margin-bottom: 28px;
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary-glow);
      letter-spacing: 1px;
    }

    /*폼 라벨 스타일*/
    .login-container label {
      font-size: 14px;
      margin-bottom: 6px;
      display: block;
      color: #cbd5e1;
    }

    /*입력 필드 공통 스타일*/
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 15px;
      margin-bottom: 16px;
      transition: border 0.2s;
    }

    /*입력 필드 포커스 시 테두리 강조*/
    input:focus {
      border-color: var(--primary);
      outline: none;
    }

    /*로그인 버튼 스타일*/
    .btn-login {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      background: var(--primary);
      color: white;
      transition: 0.25s;
      box-shadow: 0 0 10px rgba(59,130,246,0.4);
    }

    /*로그인 버튼 hover 효과*/
    .btn-login:hover {
      background: var(--primary-glow);
      box-shadow: 0 0 12px rgba(96,165,250,0.8);
    }

    /*회원가입 버튼 스타일*/
    .btn-signup {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid var(--primary);
      background: transparent;
      color: var(--primary);
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: 0.25s;
    }

    /*회원가입 버튼 hover 효과*/
    .btn-signup:hover {
      background: rgba(59,130,246,0.15);
      box-shadow: 0 0 10px rgba(96,165,250,0.5);
    }

    /*디버그용 결과 출력 영역*/
    #result {
      display: none;
    }
  </style>
  <link rel="stylesheet" href="/css/popup.css">
  <script src="/js/popup.js"></script>
</head>

<body>

<!-- 공통 네비 버튼 -->
<button class="nav-icon-btn nav-back" onclick="history.back()">←</button>
<button class="nav-icon-btn nav-home" onclick="location.href='/'">🏠</button>

<!-- 로그인 카드 -->
<div class="login-container">
  <div class="title">RUN GAME LOGIN</div>

  <form id="loginForm">
    <label>이메일</label>
    <input type="email" id="email" required>

    <label>비밀번호</label>
    <input type="password" id="password" required>

    <button type="submit" class="btn-login">로그인</button>
  </form>

  <button id="signupBtn" class="btn-signup">회원가입</button>

  <pre id="result"></pre>
</div>

<script type="module">
  import { apiFetch } from "/js/api.js";

  const resultEl = document.getElementById("result");
  const loginForm = document.getElementById("loginForm");
  const signupBtn = document.getElementById("signupBtn");

  //로그인 폼 submit 시 실행되는 처리
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault(); //기본 폼 전송 막기

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      //로그인 API 호출
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ email, password })
      });

      const json = await res.json();

      //응답이 실패이거나 success 플래그가 false인 경우
      if (!res.ok || !json.success) {
        alert(json.error || "로그인 실패!");
        return;
      }

      //로그인 성공 시 알림 후 메인 페이지로 이동
      alert("로그인 성공!");
      location.href = "/";

    } catch (err) {
      console.error(err);
      alert("로그인 중 오류가 발생했습니다.");
    }
  });

  //회원가입 버튼 클릭 시 회원가입 페이지로 이동
  signupBtn.addEventListener("click", () => {
    location.href = "/signup";
  });
</script>

</body>
</html>
