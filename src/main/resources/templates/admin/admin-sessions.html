<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>RunGame - 세션 관리</title>

  <style>
    /*전체 관리자 페이지 공통 색상*/
    :root {
      --primary:#2563eb;
      --primary-dark:#1e40af;
      --bg:#f3f4f6;
      --card:#fff;
      --border:#e5e7eb;
      --sub:#6b7280;

      --sidebar-bg:#ffffff;
      --sidebar-text:#374151;
      --sidebar-hover:#f3f4f6;
      --sidebar-active:#e0e7ff;
    }

    /*전체 레이아웃*/
    body {
      margin:0;
      display:flex;
      height:100vh;
      font-family:Inter,system-ui,-apple-system;
      background:var(--bg);
      color:#111827;
      overflow:hidden;
    }

    /*사이드바*/
    nav {
      width:240px;
      height:100vh;
      background:var(--sidebar-bg);
      color:var(--sidebar-text);
      padding-top:28px;
      border-right:1px solid var(--border);
      box-shadow:2px 0 8px rgba(0,0,0,0.04);
      overflow-y:auto;
      flex-shrink:0;
    }

    nav h2 {
      text-align:center;
      margin-bottom:24px;
      color:var(--primary-dark);
      font-weight:700;
      letter-spacing:-0.3px;
    }

    nav ul {
      list-style:none;
      padding:0;
      margin:0;
    }

    nav li {
      padding:14px 22px;
      margin:4px 12px;
      border-radius:8px;
      cursor:pointer;
      transition:background .2s, color .2s;
      font-size:15px;
    }

    nav li:hover {
      background:var(--sidebar-hover);
    }

    nav li.active {
      background:var(--sidebar-active);
      color:var(--primary-dark);
      font-weight:600;
    }

    /*우측 전체 콘텐츠 래퍼*/
    .content {
      flex:1;
      display:flex;
      flex-direction:column;
      height:100vh;
      overflow:hidden;
    }

    /*상단 헤더*/
    header {
      background:white;
      border-bottom:1px solid var(--border);
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 26px;
      box-shadow:0 1px 6px rgba(0,0,0,0.05);
      flex-shrink:0;
    }

    header h1 {
      color:var(--primary-dark);
      font-size:22px;
      font-weight:700;
    }

    header button {
      margin-left:10px;
      background:var(--primary);
      color:white;
      border:none;
      border-radius:6px;
      padding:8px 14px;
      cursor:pointer;
      font-weight:600;
      transition:background .15s;
    }

    header button:hover {
      background:var(--primary-dark);
    }

    /*메인 콘텐츠*/
    main {
      flex:1;
      overflow-y:auto;
      padding:28px;
    }

    h2 {
      color:var(--primary-dark);
      margin-top:0;
      margin-bottom:18px;
      font-size:20px;
      font-weight:700;
    }

    /*카드 박스*/
    .card {
      background:white;
      border:1px solid var(--border);
      border-radius:10px;
      padding:20px;
      margin-bottom:24px;
      box-shadow:0 2px 6px rgba(0,0,0,0.04);
    }

    /*한 줄 레이아웃*/
    .row {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:10px;
    }

    /*입력,버튼 공통 스타일*/
    input, button {
      padding:8px 10px;
      border-radius:6px;
      border:1px solid var(--border);
      font-size:14px;
    }

    /*버튼 스타일*/
    button {
      background:var(--primary);
      color:white;
      border:none;
      cursor:pointer;
      transition:background .15s;
    }

    button:hover {
      background:var(--primary-dark);
    }

    /*결과 출력 영역*/
    pre {
      background:#f3f4f6;
      padding:10px;
      border-radius:6px;
      font-size:13px;
      white-space:pre-wrap;
    }
  </style>
  <link rel="stylesheet" href="/css/popup.css">
  <script src="/js/popup.js"></script>
</head>
<body>

<nav>
  <h2>RunGame</h2>
  <ul>
    <li data-link="/rg-admin/main">📊 대시보드</li>
    <li data-link="/rg-admin/users/page">👥 유저 관리</li>
    <li class="active" data-link="/rg-admin/sessions/page">🎮 세션 관리</li>
    <li data-link="/rg-admin/leaderboard/page">🏆 리더보드</li>
    <li data-link="/rg-admin/events/page">🎯 이벤트 관리</li>
    <li data-link="/rg-admin/notices/page">📢 공지사항 관리</li>
    <li data-link="/rg-admin/qna">❓ Q&A 관리</li>
    <li data-link="/rg-admin/system/page">🖥 시스템 관리</li>
    <li data-link="/rg-admin/analytics/page">📈 분석 도구</li>
  </ul>
</nav>

<div class="content">

  <header>
    <h1>세션 관리</h1>
    <div>
      <button id="homeBtn">🏠 홈</button>
      <button id="mypageBtn">마이페이지</button>
      <button id="logoutBtn">로그아웃</button>
    </div>
  </header>

  <main>
    <h2>🎮 세션 관리</h2>
    <div class="card">
      <div class="row">
        <input id="monitorMinutes" type="number" placeholder="최근 분 (기본 10)" />
        <button id="monitorBtn">실시간 모니터링</button>
      </div>
      <pre id="outMonitor"></pre>

      <div class="row">
        <input id="from" type="date" />
        <input id="to" type="date" />
        <button id="statsBtn">일별 통계 조회</button>
      </div>
      <pre id="outStats"></pre>

      <div class="row">
        <input id="detailSessionId" type="number" placeholder="sessionId" />
        <button id="sessionDetailBtn">세션 상세 로그</button>
      </div>
      <pre id="outSessionDetail"></pre>

      <div class="row">
        <input id="forceSessionId" type="number" placeholder="sessionId" />
        <button id="forceBtn">강제 종료</button>
      </div>
      <pre id="outForce"></pre>

      <div class="row">
        <input id="recalcSessionId" type="number" placeholder="sessionId" />
        <button id="recalcBtn">재계산</button>
        <button id="resetBtn">리셋</button>
      </div>
      <pre id="outRecalc"></pre>
      <pre id="outReset"></pre>

    </div>
  </main>
</div>

<script type="module">
  import { apiFetch } from "/js/api.js";

  //좌측 사이드바 네비게이션
  document.querySelectorAll("nav li").forEach(li => {
    li.addEventListener("click", () => {
      window.location.href = li.dataset.link;
    });
  });

  //상단 공통 버튼
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await apiFetch("/api/users/logout", { method:"POST" });
    alert("로그아웃되었습니다.");
    window.location.href = "/rg-admin/login";
  });

  document.getElementById("homeBtn").onclick = () => location.href = "/rg-admin/main";
  document.getElementById("mypageBtn").onclick = () => location.href = "/mypage";

  //공통 API 호출 유틸 함수
  async function call(url, method="GET", body=null) {
    const res = await apiFetch(url, {
      method,
      headers: body ? { "Content-Type":"application/json" } : {},
      body: body ? JSON.stringify(body) : undefined
    });

    const text = await res.text();
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${text}`);

    try { return JSON.parse(text); }
    catch { return text; }
  }

  //실시간 모니터링
  monitorBtn.onclick = async () => {
    try {
      const mins = monitorMinutes.value || 10;
      const r = await call(`/rg-admin/sessions/monitor?minutes=${mins}`);
      outMonitor.textContent = JSON.stringify(r, null, 2);
    } catch (e) {
      outMonitor.textContent = e;
    }
  };

  //일별 통계 조회
  statsBtn.onclick = async () => {
    try {
      const r = await call(
        `/rg-admin/sessions/stats/daily?from=${from.value}&to=${to.value}`
      );
      outStats.textContent = JSON.stringify(r, null, 2);
    } catch (e) {
      outStats.textContent = e;
    }
  };

  //세션 상세 로그 조회
  sessionDetailBtn.onclick = async () => {
    try {
      const id = detailSessionId.value;
      if (!id) return alert("sessionId를 입력하세요");

      const r = await call(`/rg-admin/sessions/${id}/detail`);
      outSessionDetail.textContent = JSON.stringify(r, null, 2);
    } catch (e) {
      outSessionDetail.textContent = e;
    }
  };

  //세션 강제 종료
  forceBtn.onclick = async () => {
    try {
      const id = forceSessionId.value;
      if (!id) return alert("sessionId 입력해주세요");

      const r = await call(`/rg-admin/sessions/${id}/force-end`, "POST");
      outForce.textContent = JSON.stringify(r, null, 2);
    } catch (e) {
      outForce.textContent = e;
    }
  };

  //세션 결과 재계산
  recalcBtn.onclick = async () => {
    try {
      const id = recalcSessionId.value;
      if (!id) return alert("sessionId 입력해주세요");

      const r = await call(`/rg-admin/sessions/${id}/recalc`, "POST");
      outRecalc.textContent = JSON.stringify(r, null, 2);
    } catch (e) {
      outRecalc.textContent = e;
    }
  };

  //세션 리셋
  resetBtn.onclick = async () => {
    try {
      const id = recalcSessionId.value;
      if (!id) return alert("sessionId 입력해주세요");

      const r = await call(`/rg-admin/sessions/${id}/reset`, "POST");
      outReset.textContent = JSON.stringify(r, null, 2);
    } catch (e) {
      outReset.textContent = e;
    }
  };
</script>

</body>
</html>
