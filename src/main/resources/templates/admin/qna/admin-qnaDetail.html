<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Q&A 상세 - RunGame Admin</title>

  <style>
    /*전체 페이지에서 공통으로 사용하는 색상들*/
    :root {
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --border: #e5e7eb;
      --bg: #f3f4f6;
      --danger:#ef4444;

      --sidebar-bg: #ffffff;
      --sidebar-text: #374151;
      --sidebar-hover: #f3f4f6;
      --sidebar-active: #e0e7ff;
    }

    /*레이아웃 기본 설정*/
    body {
      display: flex;
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: #111827;
      height: 100vh;
      overflow: hidden;
    }

    /*사이드바*/
    nav {
      width: 240px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding-top: 28px;
      flex-shrink: 0;
    }

    nav h2 {
      text-align: center;
      margin-bottom: 24px;
      font-weight: 700;
      color: var(--primary-dark);
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    nav li {
      padding: 14px 22px;
      margin: 4px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    nav li:hover {
      background: var(--sidebar-hover);
    }

    nav li.active {
      background: var(--sidebar-active);
      font-weight: 600;
      color: var(--primary-dark);
    }

    /*오른쪽 메인 콘텐츠 래퍼*/
    .content {
      display: flex;
      flex-direction: column;
      flex: 1;
      height: 100vh;
      overflow: hidden;
    }

    /*상단 헤더*/
    header {
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 26px;
      flex-shrink: 0;
    }

    header h1 {
      color: var(--primary-dark);
      font-size: 22px;
      font-weight: 700;
    }

    header .right button {
      margin-left: 10px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    /*메인 스크롤 영역*/
    main {
      padding: 28px;
      overflow-y: auto;
      flex: 1;
    }

    /*QnA 상세 공통 박스*/
    .box {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .meta {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .content-text {
      white-space: pre-wrap;
      line-height: 1.6;
    }

    /*답변 입력 textarea*/
    textarea {
      width: 100%;
      min-height: 160px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      padding: 12px;
      font-size: 14px;
      resize: vertical;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    .save {
      background: var(--primary);
      color: white;
    }

    .danger {
      background: var(--danger);
      color: white;
    }

    .answer-wrapper {
      max-width: 1120px;
    }

    .answer-wrapper textarea {
      width: 100%;
    }
  </style>
  <link rel="stylesheet" href="/css/popup.css">
  <script src="/js/popup.js"></script>
</head>

<body>

<nav>
  <h2>RunGame</h2>
  <ul>
    <li data-link="/rg-admin/main">🏠 대시보드</li>
    <li data-link="/rg-admin/users/page">👥 유저 관리</li>
    <li data-link="/rg-admin/sessions/page">🎮 세션 관리</li>
    <li data-link="/rg-admin/leaderboard/page">🏆 리더보드</li>
    <li data-link="/rg-admin/events/page">🎯 이벤트 관리</li>
    <li data-link="/rg-admin/notices/page">📢 공지사항 관리</li>
    <li class="active" data-link="/rg-admin/qna">❓ Q&A 관리</li>
    <li data-link="/rg-admin/system/page">🖥 시스템 관리</li>
    <li data-link="/rg-admin/analytics/page">📈 분석 도구</li>
  </ul>
</nav>

<div class="content">

  <header>
    <h1>Q&A 관리</h1>
    <div class="right">
      <button onclick="location.href='/rg-admin/main'">🏠 홈</button>
      <button onclick="location.href='/mypage'">마이페이지</button>
      <button onclick="logout()">로그아웃</button>
    </div>
  </header>

  <main>

    <h2>❓ Q&A 상세</h2>

    <div class="box">
      <div class="meta" id="questionMeta"></div>
      <div class="content-text" id="questionContent"></div>
    </div>

    <div class="box">
      <h3>관리자 답변</h3>

      <div class="meta" id="answerMeta"></div>

      <div class="answer-wrapper">
        <textarea id="answerContent" placeholder="답변을 입력하세요"></textarea>
      </div>

      <div class="actions">
        <button class="btn danger" id="deleteQuestionBtn">질문 삭제</button>
        <button class="btn save" id="saveAnswerBtn">답변 저장</button>
      </div>
    </div>

  </main>

</div>

<script type="module">
  import { apiFetch } from "/js/api.js";

  //사이드바 메뉴 이동
  document.querySelectorAll("nav li").forEach(li => {
    li.onclick = () => location.href = li.dataset.link;
  });

  //로그아웃
  async function logout() {
    await apiFetch("/api/users/logout", { method: "POST" });
    location.href = "/rg-admin/login";
  }

  //현재 QnA 아이디
  const id = new URLSearchParams(location.search).get("id");

  //QnA 상세 조회
  async function loadDetail() {
  const res = await apiFetch(`/api/rg-admin/qna/questions/${id}`);
  const json = await res.json();
  const q = json.data;

  //질문 메타 정보
  questionMeta.innerText =
    `${q.writerName} · ${q.createdAt.substring(0,10)}`;

  //질문 본문
  questionContent.innerText = q.content;

  //이미 등록된 답변이 있다면 메타,내용을 같이 세팅
  if (q.answer) {
    answerMeta.innerText =
      `${q.answer.adminName} · ${q.answer.createdAt.substring(0,10)}`;
    answerContent.value = q.answer.content;
  }
}

  //답변 저장
  async function saveAnswer() {
    const content = answerContent.value.trim();
    if (!content) {
      alert("답변 내용을 입력하세요.");
      return;
    }

    const res = await apiFetch(`/api/rg-admin/qna/questions/${id}/answer`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content })
    });

    if (res.ok) {
      alert("답변이 저장되었습니다.");
      location.reload();  //저장 후 최신 데이터 다시 조회
    } else {
      alert("저장 실패");
    }
  }

  //질문 삭제
  async function deleteQuestion() {
    if (!confirm("정말 이 질문을 삭제하시겠습니까?")) return;

    const res = await apiFetch(`/api/rg-admin/qna/questions/${id}`, {
      method: "DELETE"
    });

    if (res.ok) {
      alert("삭제되었습니다.");
      location.href = "/rg-admin/qna";
    } else {
      alert("삭제 실패");
    }
  }

  //버튼 이벤트 바인딩
  const deleteBtn = document.getElementById("deleteQuestionBtn");
  const saveBtn = document.getElementById("saveAnswerBtn");

  deleteBtn.onclick = deleteQuestion; //삭제 버튼 클릭 시 질문 삭제
  saveBtn.onclick = saveAnswer; //저장 버튼 클릭 시 답변 저장

  //페이지 진입 시 상세 정보 로딩
  loadDetail();
</script>

</body>
</html>
