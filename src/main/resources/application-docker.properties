#docker
spring.application.name=run-game

#Server
server.port=8081

#DataSource
spring.datasource.url=jdbc:mysql://mysql:3306/rungame?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
spring.datasource.username=rungame
spring.datasource.password=rungame1234

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# Hibernate Batch
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Logging
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace
logging.level.com.example.rungame=debug

# JWT
jwt.secret=${JWT_SECRET}
jwt.issuer=run-game
jwt.access-valid-seconds=900
jwt.refresh-valid-seconds=1209600

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# Redis
spring.data.redis.host=redis
spring.data.redis.port=6379